<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Topology Morphing Demo</title>
  <style>
    html, body {
      margin: 0;
      height: 100%;
      overflow: hidden;
      background: radial-gradient(circle at top, #111827 0%, #05070d 55%, #000 100%);
      color: #e5e7eb;
      font-family: Arial, Helvetica, sans-serif;
    }

    #app {
      width: 100%;
      height: 100%;
      position: relative;
    }

    .hud {
      position: absolute;
      top: 16px;
      left: 16px;
      padding: 12px 14px;
      background: rgba(0, 0, 0, 0.38);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 12px;
      backdrop-filter: blur(8px);
      max-width: 360px;
      line-height: 1.35;
      box-shadow: 0 10px 30px rgba(0,0,0,0.35);
      pointer-events: none;
    }

    .hud h1 {
      margin: 0 0 8px 0;
      font-size: 18px;
      font-weight: 700;
    }

    .hud p {
      margin: 0;
      font-size: 13px;
      opacity: 0.92;
    }

    .badge {
      position: absolute;
      bottom: 16px;
      left: 16px;
      padding: 8px 10px;
      font-size: 12px;
      border-radius: 999px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.12);
      backdrop-filter: blur(6px);
      pointer-events: none;
    }

    canvas {
      display: block;
    }
  </style>

  <!-- Optional shim for broader import map support -->
  <script async src="https://unpkg.com/es-module-shims@1.10.0/dist/es-module-shims.js"></script>

  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.180.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.180.0/examples/jsm/"
      }
    }
  </script>
</head>
<body>
<div id="app">
  <div class="hud">
    <h1>Continuous Topological Deformation</h1>
    <p>
      This surface keeps the same topology while its geometry changes continuously:
      sphere-like → cube-like → organic waves → sphere-like. No tearing, no holes added,
      no pieces merged.
    </p>
  </div>
  <div class="badge">Drag to orbit • Scroll to zoom</div>
</div>

<script type="module">
  import * as THREE from "three";
  import { OrbitControls } from "three/addons/controls/OrbitControls.js";

  const container = document.getElementById("app");

  const scene = new THREE.Scene();
  scene.fog = new THREE.Fog(0x05070d, 8, 22);

  const camera = new THREE.PerspectiveCamera(
      50,
      window.innerWidth / window.innerHeight,
      0.1,
      100
  );
  camera.position.set(0, 1.6, 5.8);

  const renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.outputColorSpace = THREE.SRGBColorSpace;
  container.appendChild(renderer.domElement);

  const controls = new OrbitControls(camera, renderer.domElement);
  controls.enableDamping = true;
  controls.minDistance = 2.2;
  controls.maxDistance = 12;
  controls.autoRotate = false;

  // Lights
  const ambient = new THREE.AmbientLight(0xffffff, 0.55);
  scene.add(ambient);

  const dir1 = new THREE.DirectionalLight(0xffffff, 1.4);
  dir1.position.set(4, 5, 6);
  scene.add(dir1);

  const dir2 = new THREE.DirectionalLight(0x88aaff, 0.7);
  dir2.position.set(-5, -2, -4);
  scene.add(dir2);

  // Ground glow
  const ground = new THREE.Mesh(
      new THREE.CircleGeometry(8, 64),
      new THREE.MeshBasicMaterial({
        color: 0x1b2a4a,
        transparent: true,
        opacity: 0.18
      })
  );
  ground.rotation.x = -Math.PI / 2;
  ground.position.y = -2.15;
  scene.add(ground);

  // Geometry
  const baseGeometry = new THREE.SphereGeometry(1.5, 220, 140);
  const geometry = baseGeometry.clone();

  // Save the original spherical positions and normals
  const basePositions = geometry.attributes.position.array.slice();
  const baseNormals = geometry.attributes.normal.array.slice();

  const material = new THREE.MeshPhysicalMaterial({
    color: 0x7dd3fc,
    metalness: 0.08,
    roughness: 0.18,
    transmission: 0.08,
    thickness: 0.7,
    clearcoat: 1.0,
    clearcoatRoughness: 0.15,
    sheen: 0.4,
    side: THREE.DoubleSide
  });

  const mesh = new THREE.Mesh(geometry, material);
  scene.add(mesh);

  // A faint wireframe overlay helps reveal the continuous deformation
  const wire = new THREE.Mesh(
      geometry,
      new THREE.MeshBasicMaterial({
        color: 0xffffff,
        wireframe: true,
        transparent: true,
        opacity: 0.15
      })
  );
  scene.add(wire);

  // Background particles
  const particleCount = 700;
  const particlesGeo = new THREE.BufferGeometry();
  const particleArray = new Float32Array(particleCount * 3);

  for (let i = 0; i < particleCount; i++) {
    const r = 8 + Math.random() * 10;
    const theta = Math.random() * Math.PI * 2;
    const phi = Math.acos(2 * Math.random() - 1);

    particleArray[i * 3 + 0] = r * Math.sin(phi) * Math.cos(theta);
    particleArray[i * 3 + 1] = r * Math.cos(phi);
    particleArray[i * 3 + 2] = r * Math.sin(phi) * Math.sin(theta);
  }

  particlesGeo.setAttribute("position", new THREE.BufferAttribute(particleArray, 3));
  const particles = new THREE.Points(
      particlesGeo,
      new THREE.PointsMaterial({
        size: 0.03,
        transparent: true,
        opacity: 0.6
      })
  );
  scene.add(particles);

  function smoothPulse(t) {
    return 0.5 + 0.5 * Math.sin(t);
  }

  // Smoothly blend between deformation modes over time
  function modeWeights(t) {
    const a = smoothPulse(t * 0.7);
    const b = smoothPulse(t * 0.7 + (Math.PI * 2) / 3);
    const c = smoothPulse(t * 0.7 + (Math.PI * 4) / 3);
    const sum = a + b + c;
    return [a / sum, b / sum, c / sum];
  }

  function updateSurface(time) {
    const pos = geometry.attributes.position.array;
    const [wSphere, wCube, wWave] = modeWeights(time);

    for (let i = 0; i < pos.length; i += 3) {
      const x0 = basePositions[i + 0];
      const y0 = basePositions[i + 1];
      const z0 = basePositions[i + 2];

      const nx = baseNormals[i + 0];
      const ny = baseNormals[i + 1];
      const nz = baseNormals[i + 2];

      // Base spherical radius
      const r = Math.sqrt(x0 * x0 + y0 * y0 + z0 * z0);

      // Sphere-like mode
      const sphereRadius =
          r * (1.0 + 0.05 * Math.sin(3.0 * nx + time * 1.3) * Math.sin(3.0 * ny - time * 0.9));

      // Cube-like mode via superellipsoid-ish radial scaling
      const ax = Math.abs(nx);
      const ay = Math.abs(ny);
      const az = Math.abs(nz);
      const cubeFactor = Math.pow(
          Math.pow(ax, 10.0) + Math.pow(ay, 10.0) + Math.pow(az, 10.0),
          -1.0 / 10.0
      );
      const cubeRadius = r * cubeFactor * 1.08;

      // Organic wavy mode
      const wave =
          0.20 * Math.sin(4.0 * nx + time * 1.7) +
          0.16 * Math.sin(5.0 * ny - time * 1.2) +
          0.12 * Math.sin(6.0 * nz + time * 1.9) +
          0.08 * Math.sin(7.0 * (nx + ny + nz) - time * 1.1);

      const waveRadius = r * (1.0 + wave);

      // Blend the radii continuously
      const blendedRadius =
          wSphere * sphereRadius +
          wCube * cubeRadius +
          wWave * waveRadius;

      pos[i + 0] = nx * blendedRadius;
      pos[i + 1] = ny * blendedRadius;
      pos[i + 2] = nz * blendedRadius;
    }

    geometry.attributes.position.needsUpdate = true;
    geometry.computeVertexNormals();
  }

  const clock = new THREE.Clock();

  function animate() {
    requestAnimationFrame(animate);

    const t = clock.getElapsedTime();

    updateSurface(t);

    mesh.rotation.y += 0.0035;
    mesh.rotation.x = 0.18 * Math.sin(t * 0.35);

    wire.rotation.copy(mesh.rotation);

    particles.rotation.y += 0.0008;
    particles.rotation.x = 0.0003;

    controls.update();
    renderer.render(scene, camera);
  }

  animate();

  function onResize() {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  }

  window.addEventListener("resize", onResize);
</script>
</body>
</html>
